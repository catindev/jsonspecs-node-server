name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jsonspecs-node-server
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout demo server
        uses: actions/checkout@v4
        with:
          path: jsonspecs-node-server
      - name: Resolve jsonspecs source ref
        id: jsonspecs
        working-directory: jsonspecs-node-server
        run: echo "ref=$(node -p 'require(\"./package.json\").config.jsonspecsGitRef')" >> "$GITHUB_OUTPUT"
      - name: Checkout matching jsonspecs source
        uses: actions/checkout@v4
        with:
          repository: catindev/jsonspecs
          ref: ${{ steps.jsonspecs.outputs.ref }}
          path: jsonspecs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: jsonspecs-node-server/package-lock.json
      - run: npm ci
      - run: npm test

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demo server
        uses: actions/checkout@v4
        with:
          path: jsonspecs-node-server
      - name: Build production image
        run: docker build --tag jsonspecs-node-server:ci jsonspecs-node-server
      - name: Start production image
        run: docker run --detach --name jsonspecs-node-server-ci --publish 127.0.0.1:3000:3000 jsonspecs-node-server:ci
      - name: Verify health and engine version
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/health > /tmp/jsonspecs-health.json; then
              break
            fi
            sleep 1
          done
          test "$(cat /tmp/jsonspecs-health.json)" = '{"ok":true}'
          test "$(docker exec jsonspecs-node-server-ci curl --fail --silent --show-error http://127.0.0.1:3000/health)" = '{"ok":true}'
          expected="$(node -p 'require("./jsonspecs-node-server/package.json").config.jsonspecsVersion')"
          actual="$(docker exec jsonspecs-node-server-ci node -p 'require("jsonspecs/package.json").version')"
          test "$actual" = "$expected"
          test "$(docker exec jsonspecs-node-server-ci node -p 'require("node:fs").readlinkSync("node_modules/jsonspecs")')" = '../../jsonspecs'
      - name: Show container logs on failure
        if: failure()
        run: docker logs jsonspecs-node-server-ci || true
      - name: Stop production image
        if: always()
        run: docker rm --force jsonspecs-node-server-ci || true
